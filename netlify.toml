[build]
  command = "npm run build"
  publish = "dist"

[[edge_functions]]
  # Automatic prerender for bots
  prerender = true

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/prerender"
  status = 200
  force = true
  conditions = {UserAgent = ["Googlebot", "bingbot", "facebookexternalhit"]}
